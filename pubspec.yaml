name: cond_manager
description: Plataforma de gestão de manutenção para condomínios.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.9.1

  # State & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  image_picker: ^1.1.2
  file_picker: ^9.2.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.2.1
  http: ^1.6.0
  url_launcher: ^6.3.1
  pdf: ^3.11.3
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env
